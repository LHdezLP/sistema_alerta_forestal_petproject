services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: "/app"
    ports:
      - "${API_PORT:-8000}:8000"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: "/app"
      API_INTERNAL_URL: "${API_INTERNAL_URL:-http://api:8000}"
      API_PUBLIC_URL: "${API_PUBLIC_URL:-http://localhost:8000}"
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      - api
    command: ["streamlit", "run", "dashboard/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
